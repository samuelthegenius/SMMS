<html lang="en">

<head>

  <meta name="description" content="Smart Maintenance Management System for Mountain Top University" />

  <meta http-equiv="Permissions-Policy" content="unload=(), camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' data: blob: https://ntayjobqhpbozamoxgad.supabase.co; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http://localhost:* https://localhost:* ws://localhost:* wss://localhost:* https://ntayjobqhpbozamoxgad.supabase.co https://api.supabase.co https://mtusmms.me https://api.emailjs.com wss://ntayjobqhpbozamoxgad.supabase.co; base-uri 'self'; form-action 'self';" />
  <title>SMMS | Mountain Top University</title>
  
  <!-- Critical resource hints -->
  <link rel="preconnect" href="https://ntayjobqhpbozamoxgad.supabase.co" crossorigin />
  <link rel="dns-prefetch" href="https://ntayjobqhpbozamoxgad.supabase.co" />
  
  <!-- Preload critical fonts if any -->
  
  <!-- Inline Critical CSS - prevents render blocking -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    #root{min-height:100vh}
    .skeleton-bg{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    #initial-loader{position:fixed;inset:0;background:#fff;z-index:9999;display:flex}
    .sidebar-skel{width:256px;background:#f8fafc;border-right:1px solid #e2e8f0;display:none}
    @media(min-width:768px){.sidebar-skel{display:block}}
    .content-skel{flex:1;padding:24px}
    .skel-block{height:24px;background:#e2e8f0;border-radius:4px;margin-bottom:16px}
    .skel-card{height:128px;background:#f1f5f9;border-radius:12px;margin-bottom:16px}
    #initial-loader.hidden{display:none}
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="sidebar-skel">
      <div style="padding:24px">
        <div class="skel-block" style="height:32px;width:128px;margin-bottom:24px" class="skeleton-bg"></div>
        <div style="margin-top:24px">
          <div class="skel-block skeleton-bg"></div>
          <div class="skel-block skeleton-bg"></div>
          <div class="skel-block skeleton-bg"></div>
        </div>
      </div>
    </div>
    <div class="content-skel" id="skel-main">
      <div class="skel-block" id="skel-header" style="height:32px;width:192px;margin-bottom:24px" class="skeleton-bg"></div>
      <div id="skel-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:24px;margin-bottom:24px">
        <div class="skel-card skeleton-bg"></div>
        <div class="skel-card skeleton-bg"></div>
        <div class="skel-card skeleton-bg"></div>
      </div>
      <div id="skel-large" class="skel-card skeleton-bg" style="height:384px"></div>
    </div>
  </div>
  
  <!-- Zero-latency Context Aware Reshaping -->
  <script>
    (function() {
      try {
        var path = window.location.pathname;
        var isDash = path.startsWith('/dashboard') || path.startsWith('/new-ticket') || path.startsWith('/analytics') || path.startsWith('/history') || path.startsWith('/jobs');
        
        if (!isDash) {
          // Flatten into a generic centered page layout for Auth/Landing routes
          var sidebar = document.querySelector('.sidebar-skel');
          if(sidebar) sidebar.style.display = 'none';
          
          var main = document.getElementById('skel-main');
          if(main) {
            main.style.display = 'flex';
            main.style.flexDirection = 'column';
            main.style.alignItems = 'center';
            main.style.justifyContent = 'center';
            
            // Adjust inner blocks to look like a generic centered form / landing hero
            var header = document.getElementById('skel-header');
            if(header) { header.style.width = '60%'; header.style.maxWidth = '400px'; header.style.height = '48px'; }
            
            var grid = document.getElementById('skel-grid');
            if(grid) grid.style.display = 'none'; // Hide dashboard cards
            
            var large = document.getElementById('skel-large');
            if(large) { large.style.width = '100%'; large.style.maxWidth = '500px'; large.style.height = '300px'; large.style.borderRadius = '16px'; }
          }
        }
      } catch(e) {}
    })();
  </script>
  
  <div id="root"></div>
  
  <!-- Capture PWA install prompt early (before React mounts) -->
  <script src="/install-capture.js"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
