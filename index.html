<body>
  <div id="root"></div>
  <!-- CommonJS Polyfill: Non-blocking async module -->
  <script type="module" async>
    if (typeof window.exports === 'undefined') window.exports = {};
    if (typeof window.module === 'undefined') window.module = { exports: window.exports };
    if (typeof window.global === 'undefined') window.global = window.globalThis || window;
    if (typeof window.require === 'undefined') {
      window.require = (id) => { console.warn('require() unavailable for:', id); return {}; };
    }
  </script>
  <!-- Deferred chunk error handler - non-critical -->
  <script async type="module">
    window.addEventListener('error', (e) => handleChunkError(e));
    window.addEventListener('unhandledrejection', (e) => handleChunkError(e.reason));
    function handleChunkError(error) {
      if (!error?.message) return;
      const isChunkError = ['Failed to fetch dynamically imported module', 'Importing a module script failed', 'error loading dynamically imported module'].some(m => error.message.includes(m));
      if (isChunkError) {
        const lastReload = localStorage.getItem('chunk-error-reload');
        const now = Date.now();
        if (!lastReload || (now - parseInt(lastReload) > 10000)) {
          localStorage.setItem('chunk-error-reload', now.toString());
          // Redirect to root instead of reloading current path to prevent 404 on SPA routes
          window.location.href = '/';
        }
      }
    }
  </script>
