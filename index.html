  <script>
    // Early intervention: Disable unload API before extensions can use it
    // This prevents Permissions-Policy violation warnings from browser extensions
    try {
      if (window.addEventListener) {
        const originalAddEventListener = window.addEventListener;
        window.addEventListener = function(type, listener, options) {
          if (type === 'unload' || type === 'beforeunload') {
            // Silently drop unload listeners from extensions
            return;
          }
          return originalAddEventListener.call(this, type, listener, options);
        };
      }
      if (window.removeEventListener) {
        const originalRemoveEventListener = window.removeEventListener;
        window.removeEventListener = function(type, listener, options) {
          if (type === 'unload' || type === 'beforeunload') {
            return;
          }
          return originalRemoveEventListener.call(this, type, listener, options);
        };
      }
    } catch (e) {
      // Ignore any errors in this early script
    }
  </script>

  <script>
    // Global Safety Net: Catches ChunkLoadErrors that React boundaries might miss
    // This often happens when a user is on an old version and tries to lazily load a deleted chunk.
    window.addEventListener('error', (e) => handleChunkError(e));
    window.addEventListener('unhandledrejection', (e) => handleChunkError(e.reason));

    function handleChunkError(error) {
      if (!error || !error.message) return;

      const isChunkError = error.message.includes('Failed to fetch dynamically imported module') ||
        error.message.includes('Importing a module script failed') ||
        error.message.includes('error loading dynamically imported module');

      if (isChunkError) {
        const lastReload = localStorage.getItem('chunk-error-reload');
        const now = Date.now();

        // Limit reloads to once every 10 seconds to prevent loops
        if (!lastReload || (now - parseInt(lastReload) > 10000)) {
          console.warn('Chunk load error detected. Reloading page...');
          localStorage.setItem('chunk-error-reload', now.toString());
          window.location.reload(true);
        }
      }
    }
  </script>

  <!-- CommonJS Polyfill: Must load before any modules -->
  <script>
    // Polyfill CommonJS globals for libraries that expect them
    if (typeof window.exports === 'undefined') {
      window.exports = {};
    }
    if (typeof window.module === 'undefined') {
      window.module = { exports: window.exports };
    }
    if (typeof window.global === 'undefined') {
      window.global = window.globalThis || window;
    }
    if (typeof window.require === 'undefined') {
      window.require = function(id) {
        console.warn('require() called but not available for:', id);
        return {};
      };
    }
  </script>
